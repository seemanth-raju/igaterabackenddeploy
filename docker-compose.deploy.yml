services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Igetera2020}
      POSTGRES_DB: ${POSTGRES_DB:-igatera_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./files/sql_file/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-igatera_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: igatera-app:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-Igetera2020}@db:5432/${POSTGRES_DB:-igatera_db}
    volumes:
      - fingerprint_storage:/app/storage/fingerprints
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  fingerprint_storage:
